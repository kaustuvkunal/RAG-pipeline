<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RAG Chat</title>
  <style>
    body { font-family: system-ui; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
    #chat { border: 1px solid #cbd5e1; height: 300px; overflow-y: auto; padding: 1rem; background: #f8fafc; display: flex; flex-direction: column; border-radius: 12px; }
    input, button { width: 100%; padding: 0.8rem; margin-top: 10px; border-radius: 8px; border: 1px solid #cbd5e1; }
    .msg { margin: 6px 0; padding: 10px; border-radius: 8px; line-height: 1.5; word-break: break-word; }
    .user { background: #dbeafe; align-self: flex-end; text-align: right; }
    .bot { background: #fff7ed; align-self: flex-start; }
    .typing { color: #64748b; font-style: italic; }
  </style>
</head>
<body>
  <h2>RAG Assistant</h2>
  <div id="chat"></div>
  <input type="text" id="query" placeholder="Ask anything...">
  <button onclick="sendMessage()">Send</button>

 <script>
  const chat = document.getElementById('chat');
  let ws = null;
  let isReconnecting = false;

  function connect() {
    if (ws && ws.readyState === WebSocket.OPEN) return;
    
    // Ensure we use the correct protocol (http vs https) and host
    const url = `ws://${window.location.hostname}:${window.location.port}/api/ws`;
    console.log(`🔌 Connecting to ${url}...`);

    try {
      ws = new WebSocket(url);
      
      ws.onopen = () => {
        console.log("✅ Connected");
        document.getElementById('query').placeholder = "Ready. Ask anything...";
        isReconnecting = false;
      };

      ws.onmessage = (e) => {
        handleResponse(e.data);
      };

      ws.onerror = (err) => {
        console.error("❌ WebSocket Error:", err);
      };

      ws.onclose = (event) => {
        console.log(`⚠️ Connection closed. Code: ${event.code}, Reason: ${event.reason}`);
        if (!isReconnecting && event.code !== 1000) { // 1000 is normal close
           // Add exponential backoff to avoid spamming
           setTimeout(connect, 3000); 
        }
      };
    } catch (error) {
      console.error("Failed to create WebSocket:", error);
    }
  }

  function addMsg(text, type) {
    const div = document.createElement('div');
    div.className = `msg ${type}`;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeLoading() {
    const loading = document.getElementById('loading-msg');
    if (loading) loading.remove();
  }

  async function sendMessage() {
    const input = document.getElementById('query');
    const q = input.value.trim();
    if (!q || !ws?.OPEN) return;

    input.value = '';
    addMsg(q, 'user');
    
    // Create the "Thinking..." bubble first
    currentBotMessageDiv = document.createElement('div');
    currentBotMessageDiv.className = 'msg bot typing';
    currentBotMessageDiv.textContent = 'Generating...';
    chat.appendChild(currentBotMessageDiv);
    chat.scrollTop = chat.scrollHeight;

    isWaitingForAnswer = true; // Tell onmessage to append instead of create new

    ws.send(q);
  }

   function handleResponse(data) {
    if (isWaitingForAnswer) {
      // Append to the existing loading/thinking bubble
      currentBotMessageDiv.innerHTML += data.replace(/\n/g, '<br>');
      
      // If we just sent a blank message, this is the content
      if (currentBotMessageDiv.className.includes('typing')) {
        currentBotMessageDiv.classList.remove('typing');
        currentBotMessageDiv.style.color = 'black';
        currentBotMessageDiv.style.fontStyle = 'normal';
        currentBotMessageDiv.textContent = ''; // clear typing text, replace with actual content
      }
    } else {
      // Add a new message bubble if not streaming
      addMsg(data, 'bot');
    }
  }


  document.getElementById('query').addEventListener('keypress', e => {
    if (e.key === 'Enter') sendMessage();
  });

  connect();
</script>
</body>
</html>
